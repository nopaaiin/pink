<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINK</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

:root {
  --pink: #ff2aa6;
  --bg: #f5f0eb;
  --dark: #0a0a0a;
}

body {
  background: var(--bg);
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  font-family: 'Space Mono', monospace;
}

/* ── 커서 ── */
.cursor {
  position: fixed;
  width: 12px;
  height: 12px;
  background: var(--pink);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.1s ease, width 0.3s ease, height 0.3s ease;
  mix-blend-mode: multiply;
}
.cursor.grow {
  width: 60px;
  height: 60px;
}
.cursor-ring {
  position: fixed;
  width: 40px;
  height: 40px;
  border: 1px solid rgba(255,42,166,0.4);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s;
}

/* ── 배경 캔버스 ── */
#bgCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ── 그레인 ── */
.grain {
  position: fixed;
  inset: -50%;
  width: 200%;
  height: 200%;
  z-index: 1;
  pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  animation: grain .08s steps(1) infinite;
}
@keyframes grain {
  0%  { transform: translate(0,0); }
  20% { transform: translate(-4%,-6%); }
  40% { transform: translate(6%,2%); }
  60% { transform: translate(-2%,8%); }
  80% { transform: translate(5%,-3%); }
  100%{ transform: translate(-1%,5%); }
}

/* ── 메인 레이아웃 ── */
.scene {
  position: fixed;
  inset: 0;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── 큰 타이틀 ── */
.big-title {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  text-align: center;
  pointer-events: none;
  user-select: none;
}

.big-title h1 {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: clamp(100px, 20vw, 240px);
  color: var(--dark);
  line-height: 0.85;
  letter-spacing: -0.04em;
  mix-blend-mode: multiply;
  opacity: 0;
  transform: translateY(40px);
  animation: revealUp 1.2s cubic-bezier(.16,1,.3,1) 0.2s forwards;
}

.big-title h1 span {
  color: var(--pink);
}

@keyframes revealUp {
  to { opacity: 1; transform: translateY(0); }
}

/* ── 코너 텍스트들 ── */
.corner {
  position: fixed;
  z-index: 4;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #999;
  opacity: 0;
  animation: fadeIn 1s ease forwards;
}
.corner-tl { top: 32px; left: 36px; animation-delay: 0.8s; }
.corner-tr { top: 32px; right: 36px; animation-delay: 1.0s; text-align: right; }
.corner-bl { bottom: 32px; left: 36px; animation-delay: 1.2s; }
.corner-br { bottom: 32px; right: 36px; animation-delay: 1.4s; text-align: right; }

@keyframes fadeIn { to { opacity: 1; } }

/* ── 핑크 라인들 ── */
.line-h {
  position: fixed;
  left: 0; right: 0;
  height: 1px;
  background: var(--pink);
  z-index: 3;
  transform: scaleX(0);
  transform-origin: left;
  animation: lineIn 1s cubic-bezier(.16,1,.3,1) forwards;
}
.line-h.top    { top: 72px;    animation-delay: 0.5s; }
.line-h.bottom { bottom: 72px; animation-delay: 0.7s; transform-origin: right; }

.line-v {
  position: fixed;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--pink);
  z-index: 3;
  transform: scaleY(0);
  transform-origin: top;
  animation: lineInV 1s cubic-bezier(.16,1,.3,1) forwards;
}
.line-v.left  { left: 72px;  animation-delay: 0.6s; }
.line-v.right { right: 72px; animation-delay: 0.8s; transform-origin: bottom; }

@keyframes lineIn  { to { transform: scaleX(1); } }
@keyframes lineInV { to { transform: scaleY(1); } }

/* ── 마우스 따라오는 텍스트 ── */
.follow-text {
  position: fixed;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--pink);
  pointer-events: none;
  z-index: 5;
  transform: translate(20px, -20px);
  opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
}

/* ── 인터랙티브 워드들 ── */
.float-words {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}
.float-word {
  position: absolute;
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  color: rgba(10,10,10,0.07);
  font-size: clamp(32px, 5vw, 64px);
  letter-spacing: -0.02em;
  transition: color 0.4s, transform 0.4s;
  pointer-events: all;
  cursor: none;
  user-select: none;
}
.float-word:hover {
  color: var(--pink);
  transform: scale(1.08);
}

/* ── 하단 마퀴 ── */
.marquee-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 4;
  overflow: hidden;
  padding: 18px 0;
  border-top: 1px solid rgba(10,10,10,0.08);
  background: var(--bg);
}
.marquee-track {
  display: flex;
  white-space: nowrap;
  animation: marquee 22s linear infinite;
}
.marquee-track span {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #bbb;
  padding: 0 40px;
}
.marquee-track em {
  color: var(--pink);
  font-style: normal;
}
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ── 클릭 ripple ── */
.ripple {
  position: fixed;
  border-radius: 50%;
  border: 1px solid var(--pink);
  pointer-events: none;
  z-index: 6;
  transform: translate(-50%, -50%) scale(0);
  opacity: 1;
  animation: rippleOut 0.8s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes rippleOut {
  to { transform: translate(-50%, -50%) scale(4); opacity: 0; }
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="grain"></div>

<!-- 커서 -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="follow-text" id="followText">— explore</div>

<!-- 프레임 라인 -->
<div class="line-h top"></div>
<div class="line-h bottom"></div>
<div class="line-v left"></div>
<div class="line-v right"></div>

<!-- 코너 텍스트 -->
<div class="corner corner-tl">PINK<br>2026</div>
<div class="corner corner-tr">Work<br>in progress</div>
<div class="corner corner-bl">© Nopaaiin</div>
<div class="corner corner-br">Seoul<br>Korea</div>

<!-- 메인 타이틀 -->
<div class="big-title">
  <h1>P<span>I</span>NK</h1>
</div>

<!-- 떠다니는 단어들 -->
<div class="float-words" id="floatWords"></div>

<!-- 마퀴 -->
<div class="marquee-wrap">
  <div class="marquee-track">
    <span>PINK</span><span><em>·</em></span>
    <span>NOPAAIIN</span><span><em>·</em></span>
    <span>2026</span><span><em>·</em></span>
    <span>WORK IN PROGRESS</span><span><em>·</em></span>
    <span>SEOUL</span><span><em>·</em></span>
    <span>VISUAL</span><span><em>·</em></span>
    <span>INTERACTION</span><span><em>·</em></span>
    <span>PINK</span><span><em>·</em></span>
    <span>NOPAAIIN</span><span><em>·</em></span>
    <span>2026</span><span><em>·</em></span>
    <span>WORK IN PROGRESS</span><span><em>·</em></span>
    <span>SEOUL</span><span><em>·</em></span>
    <span>VISUAL</span><span><em>·</em></span>
    <span>INTERACTION</span><span><em>·</em></span>
  </div>
</div>

<script>
// ── 커서 ──
const cursor     = document.getElementById('cursor');
const cursorRing = document.getElementById('cursorRing');
const followText = document.getElementById('followText');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
  followText.style.left = mx + 'px';
  followText.style.top  = my + 'px';
  followText.style.opacity = '1';
});

// 링 부드럽게 따라오기
function lerp(a, b, t) { return a + (b - a) * t; }
function updateRing() {
  rx = lerp(rx, mx, 0.12);
  ry = lerp(ry, my, 0.12);
  cursorRing.style.left = rx + 'px';
  cursorRing.style.top  = ry + 'px';
  requestAnimationFrame(updateRing);
}
updateRing();

document.querySelectorAll('.float-word').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('grow'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('grow'));
});

// ── 클릭 ripple ──
document.addEventListener('click', e => {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left   = e.clientX + 'px';
  r.style.top    = e.clientY + 'px';
  r.style.width  = '60px';
  r.style.height = '60px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 800);
});

// ── 배경 캔버스 — 부드러운 블롭 ──
const bgCanvas = document.getElementById('bgCanvas');
const ctx = bgCanvas.getContext('2d');
let W, H;

function resize() {
  W = bgCanvas.width  = window.innerWidth;
  H = bgCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const blobs = Array.from({length: 4}, (_, i) => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: 200 + Math.random() * 300,
  vx: (Math.random() - 0.5) * 0.4,
  vy: (Math.random() - 0.5) * 0.4,
  phase: Math.random() * Math.PI * 2,
  speed: 0.003 + Math.random() * 0.004,
}));

let t = 0;
function drawBg() {
  t += 0.008;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f5f0eb';
  ctx.fillRect(0, 0, W, H);

  blobs.forEach((b, i) => {
    b.x += b.vx + Math.sin(t * b.speed * 2 + b.phase) * 0.5;
    b.y += b.vy + Math.cos(t * b.speed * 1.5 + b.phase) * 0.4;
    if (b.x < -b.r) b.x = W + b.r;
    if (b.x > W + b.r) b.x = -b.r;
    if (b.y < -b.r) b.y = H + b.r;
    if (b.y > H + b.r) b.y = -b.r;

    const pulse = 1 + Math.sin(t * b.speed + b.phase) * 0.15;
    const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * pulse);
    if (i === 0 || i === 2) {
      grad.addColorStop(0, 'rgba(255,42,166,0.08)');
      grad.addColorStop(1, 'rgba(255,42,166,0)');
    } else {
      grad.addColorStop(0, 'rgba(200,160,180,0.06)');
      grad.addColorStop(1, 'rgba(200,160,180,0)');
    }
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * pulse, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  });

  // 마우스 주변 핑크 빛
  if (mx || my) {
    const mg = ctx.createRadialGradient(mx, my, 0, mx, my, 180);
    mg.addColorStop(0, 'rgba(255,42,166,0.06)');
    mg.addColorStop(1, 'rgba(255,42,166,0)');
    ctx.beginPath();
    ctx.arc(mx, my, 180, 0, Math.PI * 2);
    ctx.fillStyle = mg;
    ctx.fill();
  }

  requestAnimationFrame(drawBg);
}
drawBg();

// ── 떠다니는 단어들 ──
const words = ['Form', 'Matter', 'Void', 'Signal', 'Surface', 'Residue', 'Trace', 'Drift'];
const floatWordsEl = document.getElementById('floatWords');

words.forEach((w, i) => {
  const el = document.createElement('div');
  el.className = 'float-word';
  el.textContent = w;
  el.style.left = (10 + Math.random() * 80) + '%';
  el.style.top  = (10 + Math.random() * 75) + '%';
  el.style.fontSize = (28 + Math.random() * 40) + 'px';
  el.style.opacity = (0.04 + Math.random() * 0.08).toString();
  el.style.animationDelay = (i * 0.15) + 's';

  // 천천히 떠다니기
  let px = parseFloat(el.style.left);
  let py = parseFloat(el.style.top);
  const phase = Math.random() * Math.PI * 2;
  const sp    = 0.0004 + Math.random() * 0.0006;

  el.addEventListener('mouseenter', () => {
    el.style.opacity = '0.85';
    cursor.classList.add('grow');
  });
  el.addEventListener('mouseleave', () => {
    el.style.opacity = (0.04 + Math.random() * 0.08).toString();
    cursor.classList.remove('grow');
  });

  floatWordsEl.appendChild(el);

  let tt = Math.random() * 100;
  function drift() {
    tt += 0.3;
    const nx = px + Math.sin(tt * sp * Math.PI * 2 + phase) * 0.8;
    const ny = py + Math.cos(tt * sp * Math.PI * 2 + phase) * 0.5;
    el.style.left = nx + '%';
    el.style.top  = ny + '%';
    requestAnimationFrame(drift);
  }
  drift();
});
</script>
</body>
</html>
